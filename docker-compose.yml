name: dispute-portal

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp-postgres
    environment:
      POSTGRES_DB: disputeportal
      POSTGRES_USER: dp_user
      POSTGRES_PASSWORD: dp_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dp_user -d disputeportal"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [dpnet]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # cp-zookeeper 7.6.0 disables 4-letter-word commands by default; the healthcheck
      # below uses `ruok`, so it must be whitelisted or the kafka/api gate never opens.
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,srvr"
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dpnet]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: internal (container network) and external (host debugging)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks: [dpnet]

  api:
    build:
      context: ./src/DisputePortal.Api
      dockerfile: Dockerfile
    container_name: dp-api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__Default: "Host=postgres;Database=disputeportal;Username=dp_user;Password=dp_pass"
      Kafka__BootstrapServers: "kafka:29092"
      Gemini__ApiKey: "${GEMINI_API_KEY}"
      Jwt__Secret: "${JWT_SECRET}"
      Cors__AllowedOrigins__0: "http://localhost:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [dpnet]

  frontend:
    build:
      context: ./src/dispute-portal-ui
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "http://localhost:5000/api/v1"
    container_name: dp-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:80"
    networks: [dpnet]

volumes:
  pgdata:

networks:
  dpnet:
    driver: bridge
