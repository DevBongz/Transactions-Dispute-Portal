name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore DisputePortal.sln

      - name: Build
        run: dotnet build DisputePortal.sln --configuration Release --no-restore

      - name: Test (unit + Testcontainers integration)
        run: >
          dotnet test DisputePortal.sln --configuration Release --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults
        env:
          # Must match DisputePortalApiFactory.JwtSecret — otherwise minted JWTs fail validation (401).
          Gemini__ApiKey: test-key
          Jwt__Secret: test-secret-that-is-at-least-32-bytes-long!!

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./TestResults/*.trx

  frontend:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/dispute-portal-ui
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: src/dispute-portal-ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type-check & build
        run: npm run build

      - name: Test
        run: npm run test
