server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Same-origin API proxy so the browser can call /api/v1/* without CORS
    # (used when VITE_API_BASE_URL defaults to /api/v1). The api service listens on :8080.
    location /api/ {
        proxy_pass         http://api:8080/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA history fallback so deep links (e.g. /my-disputes/123) resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|png|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
